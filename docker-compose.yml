services:
  backend:
    build:
      context: ./opspilot-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./opspilot-backend/.env
    volumes:
      # Mounts source for live-reload without rebuilding the image on every change.
      # Remove this in anything resembling a prod setup.
      - ./opspilot-backend/app:/app/app
    restart: unless-stopped

