name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opspilot-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: opspilot-backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        # No AWS credentials or LLM API keys are used or needed here — every
        # test mocks the boto3 client factory directly, per the service-layer
        # design (tools -> services -> boto3), so nothing here ever makes a
        # real network call.
        run: pytest -v

      - name: Build Docker image
        run: docker build -t opspilot-backend:ci .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opspilot-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: opspilot-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
